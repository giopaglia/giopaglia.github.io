---
layout: default
---

{% assign sections = site.sections | sort: 'order' %}
{% for section in sections %}
{% unless section.hide %}
	<section id="{{ section.slug | default: section.title | slugify }}">
		{% unless section.auto-header == "none" %}
		<h2>{{ section.title }}</h2>
		{% endunless %}
		{{ section.content }}
	</section>
{% endunless %}
{% endfor %}
